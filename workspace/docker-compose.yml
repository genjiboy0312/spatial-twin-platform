services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: building-editor-postgres
    environment:
      POSTGRES_DB: total_building_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d total_building_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: building-editor-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: building-editor-backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/total_building_db
      REDIS_URL: redis://redis:6379/0
      AUTO_CREATE_TABLES: "true"
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: building-editor-frontend
    environment:
      VITE_API_BASE_URL: ""
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
