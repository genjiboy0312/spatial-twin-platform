name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspace/backend

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: total_building_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Lint
        run: pip install ruff && ruff check app/ tests/ --no-fix

      - name: Test
        run: pytest -v
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/total_building_db
          AUTO_CREATE_TABLES: "true"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workspace/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: workspace/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build
